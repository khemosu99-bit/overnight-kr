name: Analyze

on:
  workflow_dispatch:      # 수동 실행 전용

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: 분석 실행
        run: python scripts/analyze.py
