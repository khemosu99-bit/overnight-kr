name: Build & Deploy

on:
  schedule:
    - cron: "0 22 * * 0-4"
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: 해외지표 수집
        run: python scripts/collect_overnight.py
        continue-on-error: true

      - name: KRX 수집
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python scripts/krx_history.py
        continue-on-error: true

      - name: 모델 재학습
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python scripts/realtime_model.py
        continue-on-error: true

      - name: 사이트 빌드
        run: python scripts/build_site.py

      - name: 확장 페이지 생성
        run: python scripts/pages.py

      - name: 글 발행
        run: python scripts/posts.py

      - name: 커밋
        run: |
          git config user.name "nightgap-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ site/ posts/
          git diff --staged --quiet || git commit -m "update $(date -u +%F)"
          git push || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d.outputs.page_url }}
    steps:
      - id: d
        uses: actions/deploy-pages@v4
