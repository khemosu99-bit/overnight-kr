name: Overnight Collect

on:
  schedule:
    # 매일 06:30 KST (= 21:30 UTC 전날)
    - cron: "30 21 * * *"
  workflow_dispatch:      # 수동 시운전 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: 수집 실행
        run: python scripts/collect_overnight.py

      - name: 데이터 저장
        run: |
          git config user.name  "collector-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u +%F)"
          git push
