name: KRX Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: KRX 탐침
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python scripts/realtime_probe.py

      - name: 저장
        if: always()
        run: |
          git config user.name  "krx-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "krx probe"
          git push || true
